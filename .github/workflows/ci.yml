name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            args: ""
          - os: ubuntu-24.04-arm
            name: linux-arm64
            args: ""
          - os: macos-latest
            name: macos-arm64
            args: ""
          - os: windows-latest
            name: windows-x86_64
            toolchain: stable-x86_64-pc-windows-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain || 'stable' }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-${{ matrix.name }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.name }}-cargo-

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgmp-dev libpq-dev

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gmp libpq
          echo "PKG_CONFIG_PATH=$(brew --prefix libpq)/lib/pkgconfig:$(brew --prefix gmp)/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Install system deps (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-mpfr
            mingw-w64-x86_64-mpc
            mingw-w64-x86_64-postgresql
            mingw-w64-x86_64-pkg-config

      - name: Configure Windows build env
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "PKG_CONFIG_PATH=C:/msys64/mingw64/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "C:/msys64/mingw64/bin" >> "$GITHUB_PATH"
          echo "C:/msys64/usr/bin" >> "$GITHUB_PATH"
          echo "CC=gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --workspace --verbose
